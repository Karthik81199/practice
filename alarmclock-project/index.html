<!DOCTYPE html>
<html lang="en" class="dark-theme">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Link to external CSS file -->
    <link rel="stylesheet" type="text/css" href="css/index.css">

    <!-- Link to Font Awesome Kit for icons -->
    <script src="https://kit.fontawesome.com/e80123c7cc.js" crossorigin="anonymous"></script>
</head>

<body>
    <!-- Header section -->
    <header>
        <!-- Heading of the project -->
        <div class="heading">
            <!-- H1 tag for project title -->
            <h1 class="head">Alarm Clock</h1>
        </div>
    </header>

    <!-- Main section of the page -->
    <main>
        <!-- Aside section 1 (Left side) -->
        <aside class="aside section-1">
            <!-- Main container with time elements and buttons -->
            <div class="main-container">
                <!-- Heading container for the current time -->
                <div class="heading-container">
                    <h1 class="time">Current Time</h1>
                </div>

                <!-- Container for displaying current time -->
                <div class="current-time">
                    <h1 class="current-time" id="curr-hours"></h1>
                    <h1 class="current-time" id="curr-min"></h1>
                    <h1 class="current-time" id="curr-sec"></h1>
                    <h1 class="current-time" id="format"></h1>
                </div>

                <!-- Sub-container containing hour, minute, and seconds elements -->
                <div class="sub-container">
                    <!-- Hour container -->
                    <div class="hour-container">
                        <h3 class="info-texts">Hours</h3>
                        <!-- Dropdown for selecting hours -->
                        <select class="hours" id="hours-item"></select>
                    </div>

                    <!-- Minute container -->
                    <div class="minute-container">
                        <h3 class="info-texts">Minutes</h3>
                        <!-- Dropdown for selecting minutes -->
                        <select class="minute" id='min-item'></select>
                    </div>

                    <!-- Seconds container -->
                    <div class="seconds-container">
                        <h3 class="info-texts">Seconds</h3>
                        <!-- Dropdown for selecting seconds -->
                        <select class="second" id="sec-item"></select>
                    </div>
                </div>

                <!-- Container for selecting days -->
                <div class="days" id="select-day"></div>

                <!-- Container for buttons and form -->
                <div class="buttons-container">
                    <!-- Form for adding alarms -->
                    <form class="btn-form" id="form">
                        <!-- AM radio button -->
                        <div class="container">
                            <label for="AM">AM</label>
                            <input type="radio" name="format" value="AM" id="AM" class="check">
                        </div>

                        <!-- PM radio button -->
                        <div class="container">
                            <label for="PM">PM</label>
                            <input type="radio" name="format" value="PM" id="PM" class="check">
                        </div>

                        <!-- Submit button for adding alarm -->
                        <input type="Submit" value="Add Alarm">
                    </form>
                </div>
            </div>
        </aside>

        <!-- Aside section 2 (Right side) -->
        <aside class="aside section-2">
            <!-- Container for displaying created alarms -->
            <div class="outside-container">
                <div class="inner-alarm">
                    <!-- Heading for the list of created alarms -->
                    <div class="heading-section-2">
                        <h1 class="Alarm-created">Created Alarms</h1>
                    </div>

                    <!-- Container for displaying created alarms -->
                    <div class="alarm-container"></div>
                </div>
            </div>
        </aside>
    </main>

    <!-- Link to external JavaScript file -->
    <script src="js/index.js"></script>
</body>

</html>
